<!DOCTYPE html>
<html>
<head>
    <title>Smart Alert System</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }
        .container {
            margin-top: 50px;
            background: white;
            padding: 20px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        .alert {
            color: red;
            font-weight: bold;
        }
        .prediction {
            color: blue;
            margin-top: 10px;
        }
        input {
            padding: 8px;
            margin: 10px;
        }
        button {
            padding: 8px 15px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Smart Inventory Alert</h1>

    <h2>Stock Available: {{ stock }}</h2>

    {% if message %}
        <p class="alert">{{ message }}</p>
    {% endif %}

    <p class="prediction">{{ prediction }}</p>

    <h3>Update Stock</h3>
    <form action="/update" method="post">
        <input type="number" name="stock" required>
        <br>
        <button type="submit">Update</button>
    </form>
</div>

</body>
</html><h1>h</h1>
